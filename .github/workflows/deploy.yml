name: Deploy BeautyOS Consumer

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install (monorepo root)
        run: npm install

      - name: Build consumer
        run: npm run build
        working-directory: apps/consumer
        env:
          NODE_ENV: production

      - name: SPA routing fix
        run: cp apps/consumer/dist/index.html apps/consumer/dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/consumer/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
